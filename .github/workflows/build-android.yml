name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prebuild Expo
        run: npx expo prebuild --platform android --no-install

      - name: Inject Optimizations
        run: |
          # Enable Proguard and Shrinking
          echo "android.enableProguardInReleaseBuilds=true" >> android/gradle.properties
          echo "android.enableShrinkResourcesInReleaseBuilds=true" >> android/gradle.properties
          
          # Enable ABI Splitting in build.gradle
          # We search for the defaultConfig closing brace and insert the splits block
          sed -i '/versionName "1.0.0"/a \    splits {\n        abi {\n            reset()\n            enable true\n            universalApk false\n            include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"\n        }\n    }' android/app/build.gradle

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: health-clique-release-apk
          path: android/app/build/outputs/apk/release/*.apk
